<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: transparent;
        }

        .bookmarklet-btn {
            display: inline-block;
            background-color: #032D42;
            color: white !important;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none !important;
            border-radius: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            cursor: move;
            border: 2px dashed rgba(255, 255, 255, 0.3);
        }

        .bookmarklet-btn:hover {
            background-color: #054a6d;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-5px);
            }

            60% {
                transform: translateY(-3px);
            }
        }
    </style>
</head>

<body>
    <a class="bookmarklet-btn"
        href="javascript:(function(){const script=document.createElement('script');const antiCache='?time='+new Date().getTime();script.src='https://cdn.jsdelivr.net/gh/josephhenryilagan/servicenow-toolkit-lite@main/ServiceNow%20Toolkit.js'+antiCache;script.type='text/javascript';document.head.appendChild(script)})()"
        onclick="return false;">
        ServiceNow Toolkit
    </a>
</body>

</html>
